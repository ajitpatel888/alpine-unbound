name: Build and Publish Unbound

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Build Type: Choose beta for testing, or release for production'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - release

# Grants the workflow permission to commit files back to the repository
permissions:
  contents: write
  packages: write

env:
  DOCKER_IMAGE: starlord888/alpine-unbound
  ALPINE_VERSION: '3.23.3'

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Latest Unbound Release (Hybrid Approach)
        id: unbound_release
        run: |
          # 1. Use GitHub API (authenticated) to safely get the version string and prevent rate limiting
          LATEST_TAG=$(curl -sSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/NLnetLabs/unbound/releases/latest | jq -r '.tag_name')
          VERSION=${LATEST_TAG#release-}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # 2. Use the official NLnet Labs site to get the SHA256 checksum
          SHA256_FILE_URL="https://nlnetlabs.nl/downloads/unbound/unbound-${VERSION}.tar.gz.sha256"
          SHA256=$(curl -sSL $SHA256_FILE_URL | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Archive build files to version folder
        run: |
          VERSION=${{ steps.unbound_release.outputs.version }}
          
          # Create the versioned directory
          mkdir -p versions/$VERSION
          
          # Copy the core build files AND the new modular directories into the new directory
          cp -r Dockerfile entrypoint.sh healthcheck.sh unbound.conf conf.d zones.d certs.d log.d versions/$VERSION/ || true
          
          # Configure Git as the GitHub Actions bot
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the files
          git add versions/$VERSION/
          
          # Commit and push only if there are new changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Archive configuration files for Unbound $VERSION" && git push)

      - name: Determine Docker Tags
        id: set_tags
        run: |
          VERSION=${{ steps.unbound_release.outputs.version }}
          RUN_NUM=${{ github.run_number }}
          
          # If triggered manually and "release" is chosen
          if [[ "${{ github.event.inputs.release_type }}" == "release" ]]; then
            echo "tags=${{ env.DOCKER_IMAGE }}:${VERSION},${{ env.DOCKER_IMAGE }}:latest" >> $GITHUB_OUTPUT
          
          # If triggered automatically OR "beta" is chosen
          else
            echo "tags=${{ env.DOCKER_IMAGE }}:${VERSION}-beta.${RUN_NUM},${{ env.DOCKER_IMAGE }}:beta" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
