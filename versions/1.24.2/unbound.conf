server:
  # ----------------------------------------------------------------------
  # Core Network Settings (Host Mode Loopback)
  # ----------------------------------------------------------------------
  verbosity: 0
  use-syslog: no
  logfile: ""
  interface: 127.0.0.1
  port: 5335
  do-ip4: yes
  do-udp: yes
  do-tcp: yes
  do-ip6: no
  prefer-ip6: no
  
  # ----------------------------------------------------------------------
  # Privileges & Paths
  # ----------------------------------------------------------------------
  username: "_unbound"
  root-hints: "/opt/unbound/etc/unbound/root.hints"
  auto-trust-anchor-file: "/opt/unbound/etc/unbound/root.key"

  # ----------------------------------------------------------------------
  # Access Control (Host Mode Loopback)
  # ----------------------------------------------------------------------
  access-control: 127.0.0.0/8 allow

  # ----------------------------------------------------------------------
  # Security & Privacy Hardening
  # ----------------------------------------------------------------------
  val-permissive-mode: no
  module-config: "validator iterator"
  harden-glue: yes
  harden-dnssec-stripped: yes
  harden-below-nxdomain: yes
  harden-referral-path: yes
  harden-algo-downgrade: yes
  use-caps-for-id: yes
  hide-identity: yes
  hide-version: yes
  qname-minimisation: yes
  
  # ----------------------------------------------------------------------
  # Performance Tuning
  # ----------------------------------------------------------------------
  edns-buffer-size: 1232
  prefetch: yes
  prefetch-key: yes
  serve-expired: yes
  serve-expired-ttl: 86400
  num-threads: 1
  msg-cache-size: 10m
  rrset-cache-size: 20m
  cache-min-ttl: 300
  cache-max-ttl: 86400
